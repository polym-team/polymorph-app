services:
  db:
    image: mariadb:11
    container_name: okra-db
    restart: unless-stopped
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: okra-root-password
      MYSQL_DATABASE: okra
      MYSQL_USER: okra-admin
      MYSQL_PASSWORD: okra-admin-password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - okra-db-data:/var/lib/mysql

volumes:
  okra-db-data:
