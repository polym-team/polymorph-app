services:
  collab-db:
    image: mysql:8.0
    container_name: collab-db
    restart: unless-stopped
    ports:
      - '3308:3306'
    environment:
      MYSQL_ROOT_PASSWORD: collab-root-password
      MYSQL_DATABASE: collab
      MYSQL_USER: collab-admin
      MYSQL_PASSWORD: collab-admin-password
    volumes:
      - collab-db-data:/var/lib/mysql

volumes:
  collab-db-data:
