name: Deploy collab to Polymorph K8s Production

on:
  push:
    branches: ["main"]
    paths:
      - "apps/collab/**"
      - ".github/workflows/collab-deploy-polymorph-k8s-prd.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Checkout polymorph-k8s
        uses: actions/checkout@v3
        with:
          repository: polym-team/polymorph-k8s
          token: ${{ secrets.POLYMORPH_GIT_PAT }}
          path: polymorph-k8s

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/collab/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collab:${{ github.sha }}
          provenance: false
          sbom: false

      - name: Update image tag in polymorph-k8s
        run: |
          cd polymorph-k8s

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          sed -i "s|image:.*|image: ghcr.io/${{ github.repository_owner }}/collab:${{ github.sha }}|g" manifests/collab/deployment.yaml

          git add manifests/collab/deployment.yaml
          git commit -m "chore(collab): update image to ${{ github.sha }}"

          max_attempts=5
          for i in $(seq 1 $max_attempts); do
            git push && break
            if [ $i -lt $max_attempts ]; then
              echo "Push failed, retrying... (attempt $i/$max_attempts)"
              sleep $((i * 2))
              git pull --rebase
            else
              echo "Push failed after $max_attempts attempts"
              exit 1
            fi
          done

      - name: Notify Slack
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            COLOR="good"
            STATUS="성공"
            EMOJI=":white_check_mark:"
          else
            COLOR="danger"
            STATUS="실패"
            EMOJI=":x:"
          fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{
              "attachments": [{
                "color": "'"$COLOR"'",
                "title": "'"$EMOJI"' collab 배포 '"$STATUS"'",
                "fields": [
                  { "title": "브랜치", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "커밋", "value": "`${{ github.sha }}`", "short": true },
                  { "title": "실행자", "value": "${{ github.actor }}", "short": true },
                  { "title": "워크플로우", "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|상세 보기>", "short": true }
                ]
              }]
            }'
